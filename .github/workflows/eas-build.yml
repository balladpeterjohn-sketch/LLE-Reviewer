name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify source includes image tools
        run: |
          echo "Building commit: $(git rev-parse --short HEAD)"
          git log -1 --oneline
          echo "App version: $(node -p "require('./app.json').expo.version")"
          if grep -q "imageToolsCard" src/components/ContentEditor.tsx; then
            echo "OK: Image Tools UI found in source"
          else
            echo "::error::Image Tools UI missing from source — wrong branch or old code"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK on Expo
        run: |
          echo "Starting EAS build (APK). Download from expo.dev when status is Finished."
          eas build --platform android --profile preview --non-interactive --no-wait
